<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Management System – Login</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root {
  --blue-dark: #1a5fa8;
  --blue-mid: #2979c8;
  --blue-light: #4db6f5;
  --blue-pale: #e8f4fd;
  --accent: #0ec2d4;
  --white: #ffffff;
  --gray-1: #f4f8fc;
  --gray-2: #d0dce9;
  --gray-3: #8fa6bf;
  --text: #1c2d3f;
  --shadow: 0 8px 36px rgba(26,95,168,0.18);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Lato', sans-serif;
  background: linear-gradient(135deg, #1a5fa8 0%, #0ec2d4 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

body::before, body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  opacity: 0.13;
  background: white;
}
body::before { width: 520px; height: 520px; top: -160px; left: -160px; }
body::after  { width: 420px; height: 420px; bottom: -140px; right: -120px; }

.card {
  background: var(--white);
  border-radius: 22px;
  box-shadow: var(--shadow);
  width: 370px;
  padding: 40px 36px 32px;
  animation: slideUp 0.55s ease;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(32px); }
  to   { opacity: 1; transform: translateY(0); }
}

.title-bar {
  background: linear-gradient(90deg, var(--blue-dark), var(--blue-mid));
  color: white;
  text-align: center;
  padding: 10px;
  border-radius: 22px 22px 0 0;
  margin: -40px -36px 28px;
}

.title-bar h1 { font-family: 'Nunito', sans-serif; font-size: 1.45rem; font-weight: 800; }
.title-bar p  { font-size: 0.82rem; opacity: 0.82; }

.avatar { display: flex; justify-content: center; margin-bottom: 22px; }

.avatar-circle {
  width: 72px; height: 72px;
  background: var(--blue-pale);
  border-radius: 50%;
  border: 3px solid var(--blue-mid);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  transition: all 0.3s ease;
}

.field { margin-bottom: 16px; }

label {
  font-size: 0.78rem;
  font-weight: bold;
  color: var(--gray-3);
  margin-bottom: 5px;
  display: block;
}

.field input {
  width: 100%;
  padding: 10px;
  border: 1px solid var(--gray-2);
  border-radius: 8px;
  background: var(--gray-1);
  font-size: 14px;
}

.field input:focus {
  border-color: var(--blue-mid);
  background: white;
  outline: none;
}

.show-pw { font-size: 0.84rem; margin-bottom: 18px; display: flex; align-items: center; gap: 6px; cursor: pointer; }

select {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid var(--gray-2);
  margin-bottom: 18px;
  font-size: 14px;
  background: var(--gray-1);
  cursor: pointer;
}

select:focus { border-color: var(--blue-mid); outline: none; }

.btn-login {
  width: 100%;
  padding: 12px;
  background: linear-gradient(90deg, var(--blue-dark), var(--blue-mid));
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  font-size: 15px;
  letter-spacing: 0.5px;
  transition: opacity 0.2s;
}

.btn-login:hover { opacity: 0.9; }

.footer-link { text-align: center; font-size: 0.84rem; color: var(--gray-3); margin-top: 18px; }
.footer-link a { color: var(--blue-mid); font-weight: bold; text-decoration: none; }

.msg {
  padding: 9px 12px;
  border-radius: 8px;
  font-size: 0.86rem;
  margin-bottom: 14px;
  display: none;
}
.msg.error   { background: #fdecea; color: #c0392b; display: block; }
.msg.success { background: #e8f8f1; color: #1a7a4a; display: block; }

/* Role hint badges */
.role-hints {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.hint {
  flex: 1;
  background: var(--blue-pale);
  border-radius: 8px;
  padding: 7px 8px;
  font-size: 11px;
  color: var(--blue-dark);
  text-align: center;
  line-height: 1.4;
}
.hint strong { display: block; font-size: 12px; }
</style>
</head>

<body>
<div class="card">

  <div class="title-bar">
    <h1>🏥 Hospital Login</h1>
    <p>Secure Staff Portal</p>
  </div>

  <div class="avatar">
    <div class="avatar-circle" id="avatarIcon"><i class="fas fa-user"></i></div>
  </div>

  <div id="msg" class="msg"></div>

  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter your username">
  </div>

  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password">
  </div>

  <label class="show-pw">
    <input type="checkbox" onclick="togglePw()"> Show Password
  </label>

  <label>Login As</label>
  <select id="userType" onchange="updateAvatar()">
    <option value="">Select Role</option>
    <option value="admin">Admin</option>
    <option value="doctor">Doctor</option>
    <option value="receptionist">Receptionist</option>
  </select>

  <button class="btn-login" onclick="doLogin()">Login</button>

  <div class="footer-link">
    Not yet Registered? <a href="#">Sign Up here</a>
  </div>

</div>

<script>
function togglePw() {
  const pw = document.getElementById("password");
  pw.type = (pw.type === "password") ? "text" : "password";
}

function updateAvatar() {
  const t = document.getElementById("userType").value;
  const icons = { admin: "🛡️", doctor: "👨‍⚕️", receptionist: "👩‍💼", "": "👤" };
  document.getElementById("avatarIcon").textContent = icons[t] || "👤";
}

// Role → dashboard file mapping
const dashboards = {
  admin:         "dashboard.html",
  doctor:        "doctorboard.html",
  receptionist:  "recepboard.html"
};

async function doLogin() {
  const u   = document.getElementById("username").value.trim();
  const p   = document.getElementById("password").value.trim();
  const t   = document.getElementById("userType").value;
  const msg = document.getElementById("msg");
  msg.className = "msg";

  if (!u || !p || !t) {
    msg.textContent = "Please fill all fields and select a role!";
    msg.classList.add("error");
    return;
  }

  try {
    const res = await fetch("http://localhost:8080/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: u, password: p, role: t })
    });

    if (!res.ok) throw new Error("Invalid credentials or wrong role!");
    const data = await res.json();

    localStorage.setItem("username", data.username);
    localStorage.setItem("role",     data.role);
    localStorage.setItem("userId",   data.userId);

    msg.textContent = "Login successful! Redirecting...";
    msg.classList.add("success");

    const dashboards = {
      admin:        "dashboard.html",
      doctor:       "doctorboard.html",
      receptionist: "recepboard.html"
    };
    setTimeout(() => { window.location.href = dashboards[data.role]; }, 1000);

  } catch (err) {
    msg.textContent = err.message || "Login failed.";
    msg.classList.add("error");
  }
}

// user profile update
async function updateProfile(userId, newUsername, newPassword) {
    try {
        const res = await fetch(`http://localhost:8080/api/auth/profile/${userId}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: newUsername, password: newPassword})
        });
        if (!res.ok) throw new Error('Failed to update profile');
        const updatedUser = await res.json();
        console.log('Profile updated:', updatedUser);
        return updatedUser;
    } catch (err) {
        console.error(err);
        alert(err.message);
    }
}



</script>
</body>
</html>
